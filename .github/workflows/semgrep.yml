name: Semgrep SAST (Reusable)

# Static analysis for JS/TS/React plus FTSC custom Supabase rules.
# Custom rules live canonically at semgrep-rules/supabase.yml in this repo and
# are inlined below so the workflow is self-contained (no cross-repo checkout /
# PAT needed on the Free plan). Keep the two in sync.

on:
  workflow_call:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Semgrep
        run: pip install semgrep

      - name: Write FTSC custom Supabase rules
        run: |
          mkdir -p .ftsc-semgrep
          cat > .ftsc-semgrep/supabase.yml <<'RULES'
          rules:
            - id: supabase-service-role-in-public-env
              languages: [generic]
              severity: ERROR
              message: >
                Supabase service_role key exposed via a client-bundled env var
                (NEXT_PUBLIC_ or VITE_). These ship to the browser. Use the anon
                key client-side and keep service_role server-only.
              pattern-regex: '(NEXT_PUBLIC_|VITE_)[A-Z0-9_]*(SERVICE_ROLE|SERVICE_KEY)'
              paths:
                include: ['*.ts','*.tsx','*.js','*.jsx','*.env','*.env.*']
            - id: supabase-service-role-in-component-file
              languages: [generic]
              severity: WARNING
              message: >
                Possible service_role key reference in a component file. Verify
                server-only — service_role bypasses RLS. Tune after first run.
              pattern-regex: '(SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SERVICE_KEY)'
              paths:
                include: ['*.tsx','*.jsx']
          RULES

      - name: Run Semgrep
        # --error fails the job when findings are present. Confirm registry pack
        # names resolve on first run; p/default + p/secrets are the safe floor.
        run: |
          semgrep scan \
            --config p/default \
            --config p/secrets \
            --config p/typescript \
            --config p/react \
            --config .ftsc-semgrep/supabase.yml \
            --error